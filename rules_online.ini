[custom]
;不要随意改变关键字，否则会导致出错
;acl4SSR规则
;参考1:https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full.ini
;参考2：https://raw.githubusercontent.com/cutethotw/ClashRule/main/GeneralClashRule.ini
;参考3:https://github.com/Aethersailor/Custom_OpenClash_Rules
;参考4：https://github.com/Loyalsoldier/clash-rules
;设置的原则是自己用的自定义规则-经常用的小规则-指定代理的具体应用-大规则最好不会匹配到，并且规则一旦匹配到直接返回不会等后面的规则列表。


; 1.本地地址和路由器直连域名
ruleset=🎯 全球直连,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Lan/Lan.list

; 2.自定义直连规则（确保不包含需要代理的域名）
ruleset=🎯 全球直连,https://raw.githubusercontent.com/masterzht/publiconfig/master/rules/mylan.list
;只包含常见广告关键字、广告联盟。无副作用，放心使用
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list

; 3.代理规则（按重要性或使用频率排序）
;自定义代理规则

ruleset=☠️ Claude,https://raw.githubusercontent.com/masterzht/publiconfig/master/rules/claude.list
ruleset=💬 非限节点服务,https://raw.githubusercontent.com/masterzht/publiconfig/master/rules/myNon-Restricted.list
ruleset=💬 非限节点服务,https://raw.githubusercontent.com/masterzht/publiconfig/master/rules/AI.list
ruleset=💬 非限节点服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list

;币圈
ruleset=💬 非限节点服务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Binance/Binance.list
;google系的默认代理节点
ruleset=📹 YouTube,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=🤖 Google全球业务,https://raw.githubusercontent.com/masterzht/publiconfig/master/rules/myus.list
ruleset=🤖 Google全球业务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.list




; 4.国内服务和下载规则
;一些国内的域名
ruleset=🎯 全球直连,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Direct/Direct.list
;苹果国内直连即可
;ruleset=🎯 全球直连,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple.list
;微软旗下服务
ruleset=🎯 全球直连,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Microsoft/Microsoft.list
;国内视频网站列表,比如bilibili
ruleset=🎯 全球直连,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ChinaMedia/ChinaMedia.list
;国内BAT公司及云服务厂商的IP段。所有在该云服务上的网站都可以直连。比如你网站在阿里云香港都可以直连。
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/China/China.list
;一些下载用的域名，比如迅雷aria之类
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Download.list
;BT下载直连
ruleset=🎯 全球直连,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/PrivateTracker/PrivateTracker.list

; 5.GEOIP规则
ruleset=🎯 全球直连,[]GEOIP,LAN,no-resolve
;加了no-resolve好处是不会dns泄露，坏处是比如oa.heading123就不能直连了会代理访问
ruleset=🎯 全球直连,[]GEOIP,CN,no-resolve

; 6. 漏网之鱼
ruleset=🐟 漏网之鱼,[]FINAL
;设置规则标志位

;设置分组标志位
;url-test 策略组,每隔300秒测试一次，测速超时为3s，切换节点的延迟容差为50ms
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇰🇷 韩国节点`[]🚀 手动切换`[]DIRECT


; 【优化】将主自动选择改为 fallback（故障转移）模式。
; 核心逻辑：只要当前节点没挂就死死抓着不用，彻底解决“动不动就变”；同时测试间隔缩短到 120 秒，超时 3 秒，挂了立刻切。
;【之前的配置】custom_proxy_group=♻️ 自动选择`url-test`.*`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=♻️ 自动选择`fallback`.*`https://cp.cloudflare.com/generate_204`120,3
custom_proxy_group=☠️ Claude`select`[]REJECT`.*新加坡.*`.*狮.*`.*🇸🇬.*
; 【非限节点服务（AI/OpenAI/ChatGPT）】
custom_proxy_group=💬 非限节点服务`select`[]💬 非限节点服务自动`[]🇸🇬 新加坡节点`[]🇪🇺 欧洲节点`[]🇯🇵 日本节点`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇺🇲 美国节点`[]🇰🇷 韩国节点`[]🚀 手动切换`[]DIRECT
custom_proxy_group=📹 YouTube`select`[]🇸🇬 新加坡节点`[]🇪🇺 欧洲节点`[]🇺🇲 美国节点`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇯🇵 日本节点`[]🇰🇷 韩国节点`[]🚀 手动切换`[]DIRECT
custom_proxy_group=🤖 Google全球业务`select`[]🤖 Google全球业务自动`[]🇸🇬 新加坡节点`[]🇪🇺 欧洲节点`[]🇺🇲 美国节点`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇯🇵 日本节点`[]🇰🇷 韩国节点`[]🚀 手动切换`[]DIRECT



;  基础地域策略组（优化测速参数，兼顾常规使用）
; 【优化】全组统一将测试间隔缩短至 150 秒，容差显著放宽至 150ms。将测试地址统一回常规高可用地址。
custom_proxy_group=🇭🇰 香港节点`url-test`(港|香|HK|hk|Hong Kong|HongKong|hongkong)`http://www.gstatic.com/generate_204`300,,100
custom_proxy_group=🇯🇵 日本节点`url-test`(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan)`http://www.gstatic.com/generate_204`300,,100
custom_proxy_group=🇺🇲 美国节点`url-test`(美|波特兰|亚特兰大|迈阿密|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|纽约|US|United States)`http://www.gstatic.com/generate_204`300,3,150
custom_proxy_group=🇪🇺 欧洲节点`url-test`(德|法|英)`http://www.gstatic.com/generate_204`300,,150
custom_proxy_group=🇨🇳 台湾节点`url-test`(台|新北|彰化|TW|Taiwan)`http://www.gstatic.com/generate_204`300,,100
custom_proxy_group=🇸🇬 新加坡节点`url-test`(新加坡|坡|狮城|狮|SG|🇸🇬|Singapore)`http://www.gstatic.com/generate_204`300,,100
custom_proxy_group=🇰🇷 韩国节点`url-test`(KR|🇰🇷|Korea|KOR|首尔|韩|韓)`http://www.gstatic.com/generate_204`300,,100
custom_proxy_group=🚀 手动切换`select`.*
custom_proxy_group=🤖 Google全球业务自动`url-test`(新加坡|狮|日本|东京)`https://generativelanguage.googleapis.com/v1beta/models`120,3,250
custom_proxy_group=💬 非限节点服务自动`url-test`(新加坡|坡|狮|SG|🇸🇬|日本|东京|大阪|JP)`https://api.openai.com/v1/models`120,3,300
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇪🇺 欧洲节点`[]🇰🇷 韩国节点`[]🚀 手动切换`[]DIRECT
;设置分组标志位

enable_rule_generator=true
overwrite_original_rules=true

;clash_rule_base=https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GeneralClashConfig.yml

;luck
